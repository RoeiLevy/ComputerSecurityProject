{% extends "base.html" %}
{% block content %}
<h3>Verify SHA-1 Value</h3>
<form method="post">
  <div class="field">
    <input name="username" placeholder="Username" value="{{ values.username or '' }}" class="{% if errors.username %}input-error{% endif %}" required>
    {% if errors.username %}<p class="error-text">{{ errors.username }}</p>{% endif %}
  </div>
  <div class="field">
    <input name="reset_value" placeholder="SHA-1 value" value="{{ values.reset_value or '' }}" class="{% if errors.reset_value %}input-error{% endif %}" required>
    {% if errors.reset_value %}<p class="error-text">{{ errors.reset_value }}</p>{% endif %}
  </div>
  <button type="submit">Verify</button>
</form>
{% endblock %}
