{% extends "base.html" %}
{% block content %}
<h3>Change Password</h3>
<form method="post">
  <div class="field">
    <input name="old_password" type="password" placeholder="Current password" class="{% if errors.old_password %}input-error{% endif %}" required>
    {% if errors.old_password %}<p class="error-text">{{ errors.old_password }}</p>{% endif %}
  </div>
  <div class="field">
    <input name="new_password" type="password" placeholder="New password" class="{% if errors.new_password %}input-error{% endif %}" required>
    {% if errors.new_password %}<p class="error-text">{{ errors.new_password }}</p>{% endif %}
  </div>
  <button type="submit">Update</button>
</form>
{% endblock %}
