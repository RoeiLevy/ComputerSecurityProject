{% extends "base.html" %}
{% block title %}Forgot Password — Communication_LTD{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Reset password</h1>
    <p class="auth-subtitle">Enter your username and we'll send a reset code to your email address.</p>

    <form method="post" novalidate>
      <div class="form-field">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Enter your username"
               value="{{ values.username or '' }}"
               class="{{ 'input-error' if errors.username }}" autocomplete="username">
        {% if errors.username %}<p class="error-text">{{ errors.username }}</p>{% endif %}
      </div>

      <button type="submit" class="btn-full">Send reset code</button>
    </form>

    <div class="auth-footer">
      <a href="/login">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
